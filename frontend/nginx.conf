# ──────────────────────────────────────────────────────────────────────────────
# nginx.conf — Configuracion de produccion del frontend Disfracesly
#
# Responsabilidades de este servidor virtual:
#   1. Servir el bundle estatico de React generado por Vite (dist/).
#   2. Implementar el SPA fallback requerido por React Router (History API).
#   3. Hacer de proxy inverso hacia el backend Node.js para /api/ y /uploads/,
#      eliminando la necesidad de configurar CORS cruzado en produccion.
#   4. Aplicar politicas de cache agresivas en assets con hash de contenido.
#   5. Comprimir respuestas con Gzip para reducir el tiempo de transferencia.
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # Directorio raiz del bundle generado por `vite build`.
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA Fallback ──────────────────────────────────────────────────────────
    # React Router usa la History API: las rutas como /admin/stock no existen
    # como archivos fisicos en disco. try_files intenta servir el archivo exacto
    # ($uri) o un directorio ($uri/); si ninguno existe, devuelve index.html
    # para que el router del lado del cliente tome el control.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy inverso de la API ───────────────────────────────────────────────
    # En produccion el frontend y el backend se despliegan en contenedores
    # separados de Docker. Este bloque reenvía /api/* al servicio `backend`
    # resuelto por la red interna de Docker Compose, evitando errores de CORS.
    # proxy_http_version 1.1 y los headers Upgrade/Connection son necesarios
    # para soportar conexiones WebSocket si se implementasen en el futuro.
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Proxy de archivos subidos (uploads) ───────────────────────────────────
    # Las imagenes de disfraces se almacenan en el volumen del backend.
    # Este bloque las expone bajo la misma URL base del frontend para que
    # el cliente no necesite conocer la direccion directa del backend.
    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
    }

    # ── Cache de assets estaticos ─────────────────────────────────────────────
    # Vite genera nombres de archivo con hash de contenido (p. ej. main.a3f2c1.js),
    # lo que garantiza que un cambio de contenido produce un nombre de archivo
    # distinto. Por ello es seguro aplicar expires 1y e immutable: el navegador
    # no volverá a solicitar el mismo hash aunque el sitio se actualice.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Compresion Gzip ───────────────────────────────────────────────────────
    # Reduce significativamente el tamano de transferencia de JS, CSS y JSON.
    # Los tipos de archivo listados son los que mayor beneficio obtienen de
    # la compresion de texto; los binarios (png, jpg) ya estan comprimidos.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
