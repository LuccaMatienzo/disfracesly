# ============================================================
# Disfracesly — Docker Compose
# Orquesta: db (PostgreSQL 16), backend (Express), frontend (React/Vite)
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: disfracesly_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-disfracesly}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?La variable DB_PASSWORD es requerida}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-disfracesly}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disfracesly_net

  # ----------------------------------------------------------
  # Backend — Express + Prisma
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: disfracesly_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-disfracesly}?schema=gestion
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    networks:
      - disfracesly_net

  # ----------------------------------------------------------
  # Frontend — React + Vite (dev) / Nginx (prod)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: disfracesly_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_PROXY_TARGET: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - disfracesly_net

# ----------------------------------------------------------
# Volúmenes y Red
# ----------------------------------------------------------
volumes:
  pgdata:
    driver: local
  uploads_data:
    driver: local

networks:
  disfracesly_net:
    driver: bridge
